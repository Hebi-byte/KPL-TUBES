<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TaskFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/CSS/style.css" />
</head>
<body class="login-page">
  <main id="loginRoot"></main>
  <script type="module">
    import { renderLogin } from './Content/login.js';
    import { redirectIfAlreadyLogin, setupLoginHandler } from './Content/auth.js';

    redirectIfAlreadyLogin();
    document.getElementById('loginRoot').innerHTML = renderLogin();
    setupLoginHandler();
  </script>
</body>
</html>
