<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow - Project Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="./CSS/style.css">
</head>

<body>

  <main class="main-content">
    <div class="top-bar">
      <button class="add-task-btn" onclick="openModal()">
        <span class="material-symbols-outlined">add</span>
        Add task
      </button>
    </div>
  </main>

  <div class="task-modal hidden" id="task-modal">

    <div class="modal-backdrop" onclick="closeModal()"></div>

    <div class="modal-content">

      <div class="modal-header">
        <h3>Add New Task</h3>

        <button class="close-btn" onclick="closeModal()">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>

      <div class="form-group">
        <label>Task Title</label>
        <input type="text" placeholder="What needs to be done?">
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="3" placeholder="Add more details..."></textarea>
      </div>

      <div class="form-group">
        <label>Assign To</label>

        <div class="select-wrapper">
          <select>
            <option>Nanami Kento</option>
            <option>Sephiroth</option>
          </select>

          <span class="material-symbols-outlined select-icon">
            expand_more
          </span>
        </div>
      </div>

      <div class="form-group">
        <label>Due Date</label>

        <div class="date-wrapper">
          <span class="material-symbols-outlined date-icon">
            calendar_today
          </span>

          <input type="date">
        </div>
      </div>

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeModal()">
          Cancel
        </button>

        <button class="submit-btn">
          Add Task
        </button>
      </div>

    </div>
  </div>

  <script src="./JS/script.js"></script>

</body>
</html>
