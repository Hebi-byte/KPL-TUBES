<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow Dashboard</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="logo">
      <h1>TaskFlow</h1>
    </div>

    <div class="project-section">
      <p class="sidebar-title">MY PROJECT</p>

      <nav class="project-nav">

        <a href="#" class="project-link active">
          <i class="fa-solid fa-folder-open"></i>
          <span>Project #1</span>
        </a>

        <a href="#" class="project-link">
          <i class="fa-solid fa-folder"></i>
          <span>Project #2</span>
        </a>

        <a href="#" class="project-link">
          <i class="fa-solid fa-folder"></i>
          <span>Project #3</span>
        </a>

      </nav>
    </div>

    <div class="sidebar-bottom">

      <button class="add-project-btn">
        <i class="fa-solid fa-plus"></i>
        Add Project
      </button>

      <a href="#" class="settings-link">
        <i class="fa-solid fa-gear"></i>
        <span>Setting</span>
      </a>

    </div>

  </aside>

  <!-- Main -->
  <main class="main-content">

    <div class="container">

      <!-- Header -->
      <section class="header-card">

        <div class="project-info">

          <div class="project-icon">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuAQ99oQ2DC-xTjsyvrJOlMjPBWodtLOYDJm0fFnBLS7BDzkVdDTgBOIXLAaD4NV9iUTHGb03-9wBNP9zCgh4-S-k2WJGTHJeuxIkrlDjNyMUA75aeJbLm7cky7Cwo6Xu2NgAEz9CbTqUfitegFe5uHq_2v5Ip60D-n3nwoj9VGH-ny-RRibyf-A7fyfuZe1bLWOICB5zYKpvx5BaDTobsLSdRu8XpVNvv0kLH007QL-fomcjgA7d9VjwQNcHRW7hgVoIVFXB9-zV4M" alt="">
          </div>

          <div>
            <h2>Project #1</h2>

            <div class="badge">
              <i class="fa-solid fa-users"></i>
              Public
            </div>
          </div>

        </div>

        <div class="header-actions">

          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search">
          </div>

          <div class="avatar">
            <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuCgOFV81ZdA8-I4BZ_cbMWvEP6tBHeWon708eZ2H-l7Ami53klAnLgNgMfYywVN8vgy6JUMYYEl2C_ekBITFFxEGQcrnA0sQiFK7K4rfbRng3ifVQdJFAJ5EVPTO2R2g_r_kbrREvZ0Ut8T9If5Kh-OFSkr6kytDpOnUoI6-bQPp13iVdRTQPBCF3y_8B18pgSP3b3GyKIJFoIv9bFCfJ2HxqTR2VIINXLIZ8qTucHhfwWQCKDCOX05C8-VPv6OPa-XdnJJSq_k9y0" alt="">
          </div>

        </div>

      </section>

      <!-- Toolbar -->
      <section class="toolbar">

        <button class="toolbar-btn">
          <i class="fa-solid fa-circle-check"></i>
          Incomplete tasks
        </button>

        <button class="toolbar-btn">
          <i class="fa-solid fa-arrow-up-wide-short"></i>
          Sort
        </button>

        <button class="toolbar-btn">
          <i class="fa-solid fa-plus"></i>
          Add task
        </button>

      </section>

      <!-- Task Table -->
      <section class="task-table">

        <div class="table-header">

          <div class="task-column">Task name</div>

          <div class="assignee-column">
            <i class="fa-solid fa-users"></i>
            Assignee
          </div>

          <div class="status-column">
            <div>
              <i class="fa-solid fa-sun"></i>
              Status
            </div>
          </div>

        </div>

        <div class="task-content">

          <!-- Task -->
          <div class="task-row">

            <div class="task-name">
              <i class="fa-solid fa-circle-check"></i>
              <span>Example Task</span>
            </div>

            <div class="task-user">
              <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6Jm0EfRrexpRXasz47jut9P-TWlOg9dkkmnJh7hDFosCWO3cEp094Sx-NxCoSKSQ-ex85NnX__VjZt3tVgBv7ylK1w-jZx7uOi5pJSKdZcPvPQESa5DEtI6QYTpl8hDAVfcFMfhj40raS3hn61QpdeHF9MbpaTEreKO6trS1gF-qMWYBz1uTJIhAM0uny29lhGapApFGi7d_y8EWo6iDudZHF48fXmvFx8HGBnLJ4Lkw5ALjeAvuFdxWoBycXl4Z7qK7uxWxJs6U" alt="">
              <span>Nanami Kento</span>
            </div>

            <div class="task-status">
              <span class="status-badge completed">
                Completed
              </span>
            </div>

          </div>

          <!-- Task -->
          <div class="task-row">

            <div class="task-name">
              <i class="fa-solid fa-circle-check"></i>
              <span>Example done Task</span>
            </div>

            <div class="task-user">
              <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBTk_2T2jm4AVue28gOJOyqAx0QvM5Ryn2FFpeLwqbC2B5ujsruX6NQTEp3bcsHXfsHx-J1JWFVWl-ifDPVtWD2VH3DGX9ebd05BY3RJLl4Mb-djLKxIJo18ZAUmrNAjl1h07nw8GmS8eeaGC4bdvj26Xlu-JhBku2o5E2Y5To1gHanv4Y7XbcsMMPwSdWz5GVfwdXG0Q8Sfl_4XtcU3S-CRB9yGdFGnrSCvAtK_GHBCPy-9uTCZlWJuiVKIjLeUoiJUQcYCcA4-G4" alt="">
              <span>Sephiroth</span>
            </div>

            <div class="task-status">
              <span class="status-badge pending">
                Pending
              </span>
            </div>

          </div>

        </div>

      </section>

    </div>

  </main>

  <!-- Mobile Nav -->
  <nav class="mobile-nav">
    <i class="fa-solid fa-folder-open active"></i>
    <i class="fa-solid fa-circle-plus"></i>
    <i class="fa-solid fa-gear"></i>
  </nav>

  <script src="../JS/script.js"></script>
</body>
</html>
